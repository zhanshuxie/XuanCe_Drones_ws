agent: "MASAC"
env_name: "DroneSpread3D"
env_id: "SimpleSpreadDrones3D"
env_seed: 1
continuous_action: True
learner: "MASAC_Learner"
policy: "Gaussian_MASAC_Policy"
representation: "Basic_Identical"
vectorize: "DummyVecMultiAgentEnv"
runner: "MARL"

# recurrent settings
use_rnn: False
rnn: "GRU"
fc_hidden_sizes: [64, 64, 64]
recurrent_hidden_size: 64
N_recurrent_layers: 1
dropout: 0
normalize: "LayerNorm"
initialize: "orthogonal"
gain: 0.01

representation_hidden_size: []
actor_hidden_size: [64, 64]
critic_hidden_size: [64, 64]
activation: 'leaky_relu'
activation_action: 'sigmoid'
use_parameter_sharing: True
use_actions_mask: False

seed: 1
parallels: 16
buffer_size: 100000
batch_size: 256
learning_rate_actor: 0.01
learning_rate_critic: 0.001
gamma: 0.95
tau: 0.001
alpha: 0.01
use_automatic_entropy_tuning: True

start_training: 1000
running_steps: 10000000
training_frequency: 25

use_grad_clip: False
grad_clip_norm: 10

eval_interval: 100000
test_episode: 5

log_dir: "logs/masac/"
model_dir: "models/masac/"
